services:
  admin_panel:
    build: .
    container_name: it_admin_panel
    ports:
      - "8000:8000"
    command: uvicorn admin_panel.app:app --host 0.0.0.0 --port 8000
    volumes:
      - ./admin_panel.db:/app/admin_panel.db
    restart: always

  # The magic Auto-SSL Reverse Proxy for HTTPS
  caddy:
    image: caddy:2
    container_name: caddy_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      # Caddy handles Let's Encrypt certs automatically as long as the subdomain points to this server's IP
      # and port 80 and 443 are open!
    command: caddy reverse-proxy --from it-agent.balodi.me --to http://admin_panel:8000
    depends_on:
      - admin_panel
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
  agent_bot:
    build: .
    container_name: it_agent_slack_bot
    # --ipc=host is CRITICAL for Chrome so it has enough shared memory to run
    ipc: host
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - ADMIN_PANEL_URL=http://admin_panel:8000
    command: python -m slack_bot.bot
    depends_on:
      - admin_panel
    restart: always
