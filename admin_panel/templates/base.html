<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title if title else "IT Admin Panel" }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-logo">🛡️ <span>IT Admin</span></div>
            <nav>
                <a href="/" class="{{ 'active' if page == 'dashboard' else '' }}">
                    📊 Dashboard
                </a>
                <a href="/users" class="{{ 'active' if page == 'users' else '' }}">
                    👥 User Management
                </a>
                <a href="/licenses" class="{{ 'active' if page == 'licenses' else '' }}">
                    📜 License Management
                </a>
            </nav>
        </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
